<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ survey.title }}</title>
</head>
<body style="background-color: #FFE4E1;">
    <h1>{{ survey.title }}</h1>

    <form method="post">
        {% for question in survey.questions %}
            <div style="margin-bottom: 30px;">
                <p><strong>{{ loop.index }}. {{ question.text }}</strong></p>
                {% for option in question.options %}
                    <label style="display: block; margin-left: 20px; margin-bottom: 8px;">
                        <input type="radio" name="{{ question.id }}" value="{{ option }}" required>
                        {{ option }}
                    </label>
                {% endfor %}
            </div>
        {% endfor %}
        
        <br>
        <button type="submit" style="padding: 10px 20px; font-size: 16px;">Submit Survey</button>
    </form>

    <p><a href="{{ url_for('index') }}">Back to welcome page</a></p>
</body>
</html>
